name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, matching package.json version"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set release tag
        id: release
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"

          if [ "${REQUESTED_TAG}" != "${expected_tag}" ]; then
            echo "Release tag ${REQUESTED_TAG} must match package.json version ${expected_tag}."
            exit 1
          fi

          echo "tag=${REQUESTED_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Restore SEA downloads
        uses: actions/cache@v4
        with:
          path: dist/.cache
          key: sea-downloads-${{ runner.os }}-node25-${{ hashFiles('package.json') }}
          restore-keys: |
            sea-downloads-${{ runner.os }}-node25-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

      - name: Build SEA bundles
        run: pnpm build

      - name: E2E tests against build
        run: pnpm test:e2e:build

      - name: Pack release ZIPs
        run: pnpm run pack

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          assets=(dist/rpg-framework-*.zip)

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TAG}" \
              --notes "Release ${RELEASE_TAG}"
          fi
