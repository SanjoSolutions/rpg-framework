<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cover</title>
    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; padding: 0; }
      html {
        background: linear-gradient(135deg, #fef3c7 0%, #fde68a 30%, #fca5a5 70%, #f472b6 100%);
      }
      body {
        width: 630px;
        height: 500px;
        font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(135deg, #fef3c7 0%, #fde68a 30%, #fca5a5 70%, #f472b6 100%);
        position: relative;
        overflow: hidden;
      }
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(50px);
        opacity: 0.55;
        pointer-events: none;
      }
      .b1 { width: 360px; height: 360px; background: #fb923c; top: -110px; right: -90px; }
      .b2 { width: 300px; height: 300px; background: #a78bfa; bottom: -100px; left: -80px; }

      .stage {
        position: absolute;
        inset: 0;
        padding: 40px 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        text-align: center;
        z-index: 2;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 22px;
      }
      .badge {
        padding: 7px 14px;
        background: rgba(255,255,255,0.6);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.8);
        color: #7c2d12;
        border-radius: 999px;
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 800;
      }
      .badge.llm {
        background: #1f2937;
        color: #fde68a;
        border-color: #1f2937;
      }
      .badge.free {
        background: #16a34a;
        color: #fff;
        border-color: #15803d;
      }

      h1 {
        margin: 0;
        font-size: 50px;
        font-weight: 900;
        line-height: 1.0;
        color: #1f2937;
        letter-spacing: -0.03em;
      }
      h1 em {
        font-style: normal;
        background: linear-gradient(90deg, #b91c1c, #be185d, #6d28d9);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .scene {
        margin-top: 36px;
        width: 100%;
        max-width: 300px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .bubble {
        background: rgba(255,255,255,0.94);
        border: 1px solid rgba(255,255,255,1);
        border-radius: 20px;
        padding: 12px 18px;
        box-shadow: 0 18px 36px -16px rgba(0,0,0,0.3);
        max-width: 220px;
        text-align: left;
      }
      .bubble .who {
        font-weight: 800;
        font-size: 14px;
        margin-bottom: 2px;
        letter-spacing: 0.02em;
      }
      .bubble .msg {
        color: #1f2937;
        font-size: 22px;
        line-height: 1.2;
        font-weight: 700;
      }
      .bubble.him { align-self: flex-start; border-bottom-left-radius: 6px; }
      .bubble.him .who { color: #1d4ed8; }
      .bubble.her { align-self: flex-end; border-bottom-right-radius: 6px; }
      .bubble.her .who { color: #be185d; }
    </style>
  </head>
  <body>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="stage">
      <div class="topbar">
        <span class="badge">RPG Framework</span>
        <span class="badge llm">LLM</span>
        <span class="badge free">Free Demo</span>
      </div>
      <h1>Your cast,<br/><em>role-playing</em> together.</h1>
      <div class="scene">
        <div class="bubble him">
          <div class="who">Daniel</div>
          <div class="msg">Hi</div>
        </div>
        <div class="bubble her">
          <div class="who">Elena</div>
          <div class="msg">Hi</div>
        </div>
      </div>
    </div>
  </body>
</html>
