# Project-local Codex settings for this repository.
# Source of truth for permission prefixes lives in:
#   .codex/rules/default.rules
#
# If needed, sync these rules into ~/.codex/rules/default.rules.

# Synced from /home/jonas/chat-buddy/.mcp.json
# Generated by scripts/sync-codex-mcp.sh
[mcp_servers."mcp-refactor-typescript"]
command = "npx"
args = ["-y","mcp-refactor-typescript"]

[mcp_servers."next-devtools"]
command = "npx"
args = ["-y","next-devtools-mcp@latest"]

[mcp_servers."next-devtools".tools.init]
approval_mode = "approve"

[mcp_servers."next-devtools".tools.nextjs_index]
approval_mode = "approve"

[mcp_servers."next-devtools".tools.nextjs_call]
approval_mode = "approve"

[mcp_servers."next-devtools".tools.nextjs_docs]
approval_mode = "approve"

[mcp_servers."playwright"]
command = "npx"
args = ["-y","@playwright/mcp@latest"]

[mcp_servers."playwright".tools.browser_navigate]
approval_mode = "approve"

[mcp_servers."playwright".tools.browser_evaluate]
approval_mode = "approve"

[mcp_servers."playwright".tools.browser_click]
approval_mode = "approve"

[mcp_servers."playwright".tools.browser_run_code]
approval_mode = "approve"

[mcp_servers."supabase"]
url = "http://127.0.0.1:54321/mcp"

[mcp_servers."vitest"]
command = "npx"
args = ["-y","@djankies/vitest-mcp"]
